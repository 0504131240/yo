<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="אפליקציית ניהול לקוחות, טיפולים ותשלומים">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<title>ניהול לקוחות</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #f0f4fa;
    --surface: #ffffff;
    --surface2: #e8edf5;
    --border: #d0d8e8;
    --text: #1a2340;
    --muted: #6b7a9a;
    --accent: #3b7cf4;
    --accent-light: rgba(59,124,244,0.10);
    --green: #1a9e5c;
    --green-light: rgba(26,158,92,0.10);
    --red: #dc3545;
    --red-light: rgba(220,53,69,0.10);
    --yellow: #e09c00;
    --yellow-light: rgba(224,156,0,0.10);
    --purple: #6c5ce7;
    --purple-light: rgba(108,92,231,0.10);
    --shadow: 0 2px 12px rgba(30,50,100,0.08);
    --shadow-lg: 0 8px 32px rgba(30,50,100,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--surface2);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(180deg, #d6e4f7 0%, #c2d6f0 100%);
    color: var(--text);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #3b7cf4, #6c5ce7);
    border-radius: 12px;
    box-shadow: 0 4px 12px rgba(79,142,247,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .brand-name {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #1a2d5a;
  }

  .brand-sub {
    font-size: 12px;
    color: #5a7aa8;
    font-weight: 500;
  }

  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-add:hover {
    filter: brightness(1.15);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(79,142,247,0.3);
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 32px 40px 0;
    max-width: 1200px;
    margin: 0 auto;
    animation: fadeUp 0.5s ease both;
  }

  .stat-card {
    background: var(--surface);
    border-radius: 18px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
    letter-spacing: -1px;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.orange { color: var(--accent); }

  .stat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* FILTERS */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 24px 40px;
    max-width: 1200px;
    margin: 0 auto;
    flex-wrap: wrap;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 11px 40px 11px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: all 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.15); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  .filter-btn {
    padding: 11px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(79,142,247,0.3);
  }

  .filter-btn.active.red-filter {
    background: var(--red);
    border-color: var(--red);
    box-shadow: 0 4px 12px rgba(240,90,90,0.3);
  }

  /* TABLE */
  .table-wrap {
    padding: 0 40px 40px;
    max-width: 1200px;
    margin: 0 auto;
    animation: fadeUp 0.5s ease 0.15s both;
  }

  .table-container {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
    backdrop-filter: blur(4px);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: #f5f8ff;
    padding: 14px 20px;
    text-align: right;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: rowIn 0.3s ease both;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(59,124,244,0.04); }

  td {
    padding: 16px 20px;
    font-size: 14px;
    vertical-align: middle;
  }

  .client-name {
    font-weight: 600;
    color: var(--text);
  }

  .client-phone {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .meeting-date {
    font-size: 13px;
    color: var(--text);
  }

  .meeting-notes {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .amount {
    font-weight: 700;
    font-size: 15px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-paid { background: rgba(52,201,123,0.15); color: var(--green); border: 1px solid rgba(52,201,123,0.3); }
  .badge-unpaid { background: rgba(240,90,90,0.15); color: var(--red); border: 1px solid rgba(240,90,90,0.3); }
  .badge-clickable {
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: 8px 16px;
    font-size: 13px;
    min-width: 100px;
    justify-content: center;
  }
  .badge-clickable:hover { filter: brightness(0.9); }
  .badge-clickable:active {
    transform: scale(0.93);
    filter: brightness(0.8);
  }

  .actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .action-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }

  .action-btn:hover { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 8px rgba(79,142,247,0.2); }
  .action-btn.delete:hover { border-color: var(--red); background: var(--red-light); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,12,20,0.8);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 8px 40px rgba(30,50,100,0.15), 0 0 0 1px var(--border);
    animation: modalIn 0.3s ease;
    margin: auto;
  }

  .modal-title {
    font-size: 1.3rem;
    font-weight: 800;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
  }

  .form-row { margin-bottom: 16px; }

  .form-row label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-row input,
  .form-row select,
  .form-row textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface2);
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }

  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus { border-color: var(--accent); }

  .form-row textarea { resize: vertical; min-height: 70px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .btn-submit:hover { background: #b04415; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }
  .desktop-nav-btns { display: flex; }
  @media (max-width: 768px) {
    .desktop-nav-btns { display: none !important; }
    .bottom-nav { display: flex; }
  }
  @media (min-width: 769px) {
    .bottom-nav { display: none; }
    body { padding-bottom: 0; }
  }

  .month-nav-wrap {
    padding: 20px 20px 0;
    max-width: 1200px;
    margin: 0 auto;
    animation: fadeUp 0.5s ease both;
  }

  .income-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px 40px 0;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* כרטיסי טיפולים לסלולר */
  .treatment-card {
    display: none;
  }

  @media (max-width: 768px) {
    .header {
      padding: 12px 14px;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .header-brand { justify-content: flex-start; }
    .header-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }
    .header-actions .btn-add {
      justify-content: center;
      padding: 10px 6px;
      font-size: 12px;
    }
    .btn-add-wide { grid-column: 1 / -1; }
    .month-nav-wrap { padding: 12px 12px 0; }
    .income-row { padding: 8px 12px 0; }
    .stats { grid-template-columns: 1fr 1fr; padding: 12px 12px 0; }
    .controls { padding: 10px 12px; }
    .table-wrap { padding: 0 10px 40px; }
    .form-grid { grid-template-columns: 1fr; }

    /* הסתרת טבלה במובייל */
    .table-container { display: none; }

    /* הצגת כרטיסים */
    .treatment-card { display: block; }
    #cards-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }
    .t-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .t-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      justify-content: flex-end;
    }

    .badge-clickable { padding: 8px 12px; font-size: 12px; }
  }

/* BOTTOM NAV BAR */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 150;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -4px 20px rgba(30,50,100,0.1);
}
.bottom-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px 8px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--muted);
  font-family: 'Heebo', sans-serif;
  font-size: 10px;
  font-weight: 600;
  gap: 4px;
  transition: color 0.2s;
  position: relative;
}
.bottom-nav-btn:active { transform: scale(0.92); }
.bottom-nav-btn .nav-icon { font-size: 22px; line-height: 1; }
.bottom-nav-btn.active { color: var(--accent); }
.bottom-nav-btn.active::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 4px 4px;
}
.bottom-nav-btn.green { color: var(--green); }
.bottom-nav-btn.green::before { background: var(--green); }
.bottom-nav-btn.purple { color: var(--purple); }
.bottom-nav-btn.purple::before { background: var(--purple); }
.bottom-nav-btn.pink { color: #e91e8c; }
.bottom-nav-btn.pink::before { background: #e91e8c; }

/* push content above bottom bar */
body { padding-bottom: 70px; }

</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="brand-icon">📋</div>
    <div>
      <div class="brand-name">לאלי שטיינהרט</div>
      <div class="brand-sub">קלינאית</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="sync-status" style="font-size:12px;color:var(--muted);transition:opacity 0.5s;white-space:nowrap;"></span>
    <button onclick="load()" style="width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;" title="רענן">🔄</button>
    <!-- Desktop only buttons -->
    <div class="desktop-nav-btns" style="display:flex;gap:8px;">
      <button class="btn-add" style="background:linear-gradient(135deg,#34c97b,#28a062);box-shadow:0 4px 12px rgba(52,201,123,0.25);padding:9px 16px;font-size:13px;" onclick="openMeetingModal()">➕ טיפול חדש</button>
      <button class="btn-add" style="background:linear-gradient(135deg,#7c6ef7,#5c4fd6);box-shadow:0 4px 12px rgba(124,110,247,0.25);padding:9px 16px;font-size:13px;" onclick="openPaymentModal()">💳 תשלום</button>
      <button class="btn-add" style="background:linear-gradient(135deg,#e91e8c,#c2185b);box-shadow:0 4px 12px rgba(233,30,140,0.25);padding:9px 16px;font-size:13px;" onclick="openWeeklyCalendar()">🗓️ לוח</button>
      <button class="btn-add" style="background:var(--surface2);border:1px solid var(--border);padding:9px 16px;font-size:13px;" onclick="openClientsPanel()">👥 לקוחות</button>
    </div>
  </div>
</div>

<!-- MONTH NAVIGATOR -->
<div class="month-nav-wrap">
  <div style="display:flex;align-items:center;gap:16px;background:var(--surface);border-radius:16px;padding:16px 24px;border:1px solid var(--border);box-shadow:var(--shadow);">
    <button onclick="changeMonth(-1)" style="width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">‹</button>
    <div style="flex:1;text-align:center;">
      <div id="month-label" style="font-size:1.2rem;font-weight:800;color:var(--text);"></div>
    </div>
    <button onclick="changeMonth(1)" style="width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">›</button>
    <button onclick="goToToday()" style="padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;font-family:'Heebo',sans-serif;font-weight:600;color:var(--muted);transition:all 0.2s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">היום</button>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px 20px 0;max-width:1200px;margin:0 auto;">

  <!-- כרטיס טיפולים -->
  <div style="background:var(--surface);border-radius:20px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--border);">
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:14px;letter-spacing:0.5px;">📋 טיפולים</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--muted);">השנה</span>
        <span style="font-size:1.6rem;font-weight:800;color:var(--accent);" id="stat-year-total">0</span>
      </div>
      <div style="height:1px;background:var(--border);"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--muted);">החודש</span>
        <span style="font-size:1.3rem;font-weight:700;color:var(--text);" id="stat-total">0</span>
      </div>
      <div style="height:1px;background:var(--border);"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--muted);">⚠️ לא שולמו</span>
        <span style="font-size:1.3rem;font-weight:700;color:var(--red);" id="stat-unpaid">0</span>
      </div>
    </div>
  </div>

  <!-- כרטיס הכנסות -->
  <div style="background:var(--surface);border-radius:20px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--border);">
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:14px;letter-spacing:0.5px;">💰 הכנסות</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--muted);">השנה</span>
        <span style="font-size:1.6rem;font-weight:800;color:var(--green);" id="stat-revenue-year">₪0</span>
      </div>
      <div style="height:1px;background:var(--border);"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--muted);">החודש</span>
        <span style="font-size:1.3rem;font-weight:700;color:var(--text);" id="stat-revenue-month">₪0</span>
      </div>

#calendarOverlay {
  position: fixed; inset: 0;
  background: rgba(15,30,70,0.6);
  backdrop-filter: blur(4px);
  z-index: 300; display: none;
  align-items: flex-start; justify-content: center;
  padding: 20px; overflow-y: auto;
}
#calendarOverlay.open { display: flex; }
#calendarModal {
  background: var(--surface);
  border-radius: 20px; width: 100%; max-width: 780px;
  box-shadow: var(--shadow-lg); animation: modalIn 0.3s ease;
  margin: auto;
}
.cal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 1px; background: var(--border);
  border-radius: 0 0 20px 20px; overflow: hidden;
}
.cal-day-header {
  background: var(--surface2);
  padding: 10px 8px; text-align: center;
  font-size: 12px; font-weight: 800; color: var(--muted);
}
.cal-day-header.today-col { color: var(--accent); }
.cal-cell {
  background: var(--surface); min-height: 80px; padding: 8px 6px;
}
.cal-slot {
  border-radius: 8px; padding: 6px 8px; margin-bottom: 4px;
  font-size: 12px; cursor: pointer; transition: opacity 0.15s;
  border: 1px solid transparent;
}
.cal-slot:hover { opacity: 0.8; }
.cal-slot.active-slot { background: rgba(52,201,123,0.12); color: #2e7d32; border-color: #a5d6a7; }
.cal-slot.cancelled-slot { background: rgba(230,81,0,0.15); color: #c0392b; border-color: #ffcc80; text-decoration: line-through; }
.cal-slot.past-slot { opacity: 0.5; cursor: default; }
@media (max-width: 600px) {
  .cal-grid { grid-template-columns: repeat(3, 1fr); }
}
